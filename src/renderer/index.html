<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' http://127.0.0.1:9999 http://localhost:8080;">
    <title>API Courier</title>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-left">
                <!-- Environment selector will be inserted here by EnvironmentManager -->
            </div>
            <div class="header-center">
                <div class="app-title">API Courier</div>
            </div>
            <div class="header-right">
                <div class="theme-selector">
                    <select id="theme-dropdown">
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="purple">Purple</option>
                        <option value="orange">Orange</option>
                        <option value="red">Red</option>
                        <option value="magenta">Magenta</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="main-container">
            <nav class="sidebar">
                <div class="sidebar-feedback">
                    <button id="feedback-btn" class="feedback-btn" title="Share feedback">
                        <span class="feedback-icon">💬</span>
                        <span class="feedback-label">Feedback</span>
                    </button>
                </div>
                <div class="nav-tabs">
                    <button class="nav-tab active" data-tab="api">
                        <span class="nav-icon">🚀</span>
                        <span class="nav-label">API</span>
                    </button>
                    <button class="nav-tab" data-tab="json-viewer">
                        <span class="nav-icon">📄</span>
                        <span class="nav-label">JSON Viewer</span>
                    </button>
                    <button class="nav-tab" data-tab="json-compare">
                        <span class="nav-icon">🔍</span>
                        <span class="nav-label">JSON Compare</span>
                    </button>
                    <button class="nav-tab" data-tab="load-testing">
                        <span class="nav-icon">⚡</span>
                        <span class="nav-label">Load Testing</span>
                    </button>
                    <button class="nav-tab" data-tab="ask-ai">
                        <span class="nav-icon">🤖</span>
                        <span class="nav-label">Ask AI</span>
                    </button>
                </div>
            </nav>

            <main class="content">
                <div id="api-tab" class="tab-content active">
                    <div class="request-tabs">
                        <div class="tab-list" id="request-tab-list">
                            <button class="request-tab" data-tab-id="new">+ New Request</button>
                        </div>
                    </div>

                    <div class="api-layout">
                        <div class="collections-panel">
                            <div class="panel-header">
                                <h3>Collections</h3>
                                <div class="panel-header-actions">
                                    <button class="btn-import" id="btn-import" title="Import Collection">📥</button>
                                    <button class="btn-add" id="add-collection" title="Add Collection">+</button>
                                </div>
                            </div>
                            <div class="collections-tree" id="collections-tree">
                                <div class="empty-state">No collections yet. Click + to create one.</div>
                            </div>
                            <div class="resize-handle" data-panel="collections"></div>
                        </div>

                        <div class="request-panel">
                            <div class="panel-header">
                                <h3>Request</h3>
                            </div>
                            <div class="request-form">
                                <div class="request-line">
                                    <select id="request-method" class="method-select">
                                        <option value="GET">GET</option>
                                        <option value="POST">POST</option>
                                        <option value="PUT">PUT</option>
                                        <option value="PATCH">PATCH</option>
                                        <option value="DELETE">DELETE</option>
                                        <option value="HEAD">HEAD</option>
                                        <option value="OPTIONS">OPTIONS</option>
                                    </select>
                                    <input type="text" id="request-url" class="url-input" placeholder="Enter request URL">
                                    <button id="send-request" class="send-btn">Send</button>
                                </div>

                                <div class="request-details">
                                    <div class="tabs">
                                        <button class="tab active" data-section="params">Params</button>
                                        <button class="tab" data-section="body">Body</button>
                                        <button class="tab" data-section="auth">Auth</button>
                                        <button class="tab" data-section="headers">Headers</button>
                                    </div>

                                    <div id="params-section" class="section active">
                                        <div class="key-value-editor" id="params-editor">
                                            <div class="kv-row">
                                                <input type="checkbox" class="kv-checkbox" checked>
                                                <input type="text" placeholder="Key" class="key-input">
                                                <input type="text" placeholder="Value" class="value-input">
                                                <button class="remove-btn">×</button>
                                            </div>
                                        </div>
                                        <button class="add-param-btn">Add Parameter</button>
                                    </div>

                                    <div id="body-section" class="section">
                                        <!-- Enhanced body editor will be inserted here by RequestBodyEditor -->
                                    </div>

                                    <div id="auth-section" class="section">
                                        <select id="auth-type">
                                            <option value="none">No Auth</option>
                                            <option value="basic">Basic Auth</option>
                                            <option value="bearer">Bearer Token</option>
                                            <option value="api-key">API Key</option>
                                            <option value="oauth2">OAuth 2.0</option>
                                        </select>
                                        <div id="auth-config" class="auth-config"></div>
                                        <div id="oauth-status" class="oauth-status" style="display: none;"></div>
                                    </div>

                                    <div id="headers-section" class="section">
                                        <div class="key-value-editor" id="headers-editor">
                                            <div class="kv-row">
                                                <input type="checkbox" class="kv-checkbox" checked>
                                                <input type="text" placeholder="Key" class="key-input">
                                                <input type="text" placeholder="Value" class="value-input">
                                                <button class="remove-btn">×</button>
                                            </div>
                                        </div>
                                        <button class="add-header-btn">Add Header</button>
                                    </div>
                                </div>
                            </div>
                            <div class="resize-handle" data-panel="request"></div>
                        </div>

                        <div class="response-panel">
                            <div class="panel-header">
                                <h3>Response</h3>
                                <div class="response-meta" id="response-meta"></div>
                            </div>
                            <div class="response-content">
                                <div class="response-tabs">
                                    <button class="tab active" data-section="body">Body</button>
                                    <button class="tab" data-section="headers">Headers</button>
                                    <span class="response-timestamp" id="response-timestamp"></span>
                                </div>
                                <div class="response-actions" id="response-actions" style="display: none;">
                                    <button class="response-action-btn" id="enlarge-btn" title="Open in fullscreen mode">Enlarge</button>
                                    <button class="response-action-btn" id="copy-btn" title="Copy JSON response to clipboard">Copy</button>
                                    <button class="response-action-btn" id="search-btn" title="Search within JSON response">Search</button>
                                    <button class="response-action-btn" id="collapse-btn" title="Collapse all JSON nodes">Collapse</button>
                                    <button class="response-action-btn" id="expand-btn" title="Expand all JSON nodes">Expand</button>
                                    <button class="response-action-btn" id="top-btn" title="Scroll to top of response">Top</button>
                                    <button class="response-action-btn" id="bottom-btn" title="Scroll to bottom of response">Bottom</button>
                                    <button class="response-action-btn ask-ai-btn" id="ask-ai-btn" title="Ask AI about this response">Ask AI</button>
                                </div>
                                <div class="floating-search-bar" id="floating-search-bar" style="display: none;">
                                    <input type="text" class="floating-search-input" placeholder="Search in JSON...">
                                    <span class="floating-search-results">0/0</span>
                                    <button class="floating-search-nav" id="search-prev">↑</button>
                                    <button class="floating-search-nav" id="search-next">↓</button>
                                    <button class="floating-search-close" id="search-close">×</button>
                                </div>
                                <div id="response-body" class="response-section active">
                                    <div class="response-placeholder">Send a request to see the response here</div>
                                </div>
                                <div id="response-headers" class="response-section">
                                    <div class="response-placeholder">No response headers</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="json-viewer-tab" class="tab-content">
                    <!-- JSON Viewer content will be rendered here by JsonViewerTab -->
                </div>

                <div id="json-compare-tab" class="tab-content">
                    <!-- JSON Compare React component will be mounted here -->
                </div>

                <div id="load-testing-tab" class="tab-content">
                    <!-- Load testing content will be rendered here by LoadTestPage -->
                </div>

                <div id="ask-ai-tab" class="tab-content">
                    <div class="coming-soon">
                        <h2>Ask AI</h2>
                        <p>Coming Soon...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
