<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' http://127.0.0.1:* http://localhost:*;"
    />
    <title>Restbro</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="header-left">
          <!-- Environment selector will be inserted here by EnvironmentManager -->
        </div>
        <div class="header-center">
          <div class="app-title">Restbro</div>
        </div>
        <div class="header-right">
          <button id="backup-button" class="backup-button" title="Time Machine">
            Time Machine
          </button>
          <button id="theme-button" class="theme-button" title="Change Theme">
            Theme
          </button>
        </div>
      </header>

      <div class="main-container">
        <nav class="sidebar">
          <div class="sidebar-feedback">
            <button
              id="feedback-btn"
              class="feedback-btn"
              title="Share feedback"
            >
              <svg
                class="ui-icon feedback-icon"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  d="M6 5h12a4 4 0 0 1 4 4v6a4 4 0 0 1-4 4H9l-5 4v-4H6a4 4 0 0 1-4-4V9a4 4 0 0 1 4-4z"
                />
                <path d="M8 11h8M8 14h6" />
              </svg>
              <span class="feedback-label">Feedback</span>
            </button>
          </div>
          <div class="nav-tabs">
            <button class="nav-tab active" data-tab="api">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 3c3.7 0 6.8 3.1 6.8 6.8 0 4.6-3.6 8.6-6.8 10.9-3.2-2.3-6.8-6.3-6.8-10.9C5.2 6.1 8.3 3 12 3z"
                />
                <path d="M9 10h6M12 7v6" />
              </svg>
              <span class="nav-label">API</span>
            </button>
            <button class="nav-tab" data-tab="json-viewer">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 3h6l5 5v13H8z" />
                <path d="M14 3v5h5" />
                <path d="M10 13h7M10 17h7M10 9h2" />
              </svg>
              <span class="nav-label">JSON Viewer</span>
            </button>
            <button class="nav-tab" data-tab="json-compare">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="5" />
                <path d="M16 16l4 4" />
                <path d="M7 7l8 8" />
              </svg>
              <span class="nav-label">JSON Compare</span>
            </button>
            <button class="nav-tab" data-tab="notepad">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 3h9l3 3v15H6z" />
                <path d="M15 3v3h3" />
                <path d="M9 10h6M9 14h6M9 18h4" />
              </svg>
              <span class="nav-label">Notepad</span>
            </button>
            <button class="nav-tab" data-tab="load-testing">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M13 3L6 14h5l-1 7 7-11h-5l1-7z" />
              </svg>
              <span class="nav-label">Load Testing</span>
            </button>
            <button class="nav-tab" data-tab="mock-server">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="4" width="18" height="6" rx="1" />
                <rect x="3" y="14" width="18" height="6" rx="1" />
                <circle cx="7" cy="7" r="1.5" />
                <circle cx="7" cy="17" r="1.5" />
              </svg>
              <span class="nav-label">Mock Server</span>
            </button>
            <button class="nav-tab" data-tab="ask-ai">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="7" width="16" height="11" rx="3" />
                <path d="M12 4v3M8 12h.01M16 12h.01M9 15h6" />
              </svg>
              <span class="nav-label">Ask AI</span>
            </button>
            <button class="nav-tab" data-tab="curl-tool">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                <polyline points="4 17 10 11 4 5" />
                <line x1="12" y1="19" x2="20" y2="19" />
              </svg>
              <span class="nav-label">cURL</span>
            </button>
          </div>
        </nav>

        <main class="content">
          <div id="api-tab" class="tab-content active">
            <div class="request-tabs">
              <div class="tab-list" id="request-tab-list">
                <button class="request-tab" data-tab-id="new">
                  + New Request
                </button>
              </div>
            </div>

            <div class="api-layout">
              <div class="collections-panel">
                <div class="collections-toolbar">
                  <button
                    class="btn-import"
                    id="btn-import"
                    title="Import Collection"
                  >
                    <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M12 3v10M12 13l-4-4M12 13l4-4" />
                      <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
                    </svg>
                  </button>
                  <button
                    class="btn-add"
                    id="add-collection"
                    title="Add Collection"
                  >
                    +
                  </button>
                </div>
                <div class="collections-tree" id="collections-tree">
                  <div class="empty-state">
                    No collections yet. Click + to create one.
                  </div>
                </div>
                <div class="resize-handle" data-panel="collections"></div>
              </div>

              <div class="request-panel">
                <div class="request-form">
                  <div class="request-line">
                    <select id="request-method" class="method-select">
                      <option value="GET">GET</option>
                      <option value="POST">POST</option>
                      <option value="PUT">PUT</option>
                      <option value="PATCH">PATCH</option>
                      <option value="DELETE">DELETE</option>
                      <option value="HEAD">HEAD</option>
                      <option value="OPTIONS">OPTIONS</option>
                    </select>
                    <div class="url-input-wrapper">
                      <input
                        type="text"
                        id="request-url"
                        class="url-input"
                        placeholder="Enter request URL"
                      />
                    </div>
                    <button id="send-request" class="send-btn">Send</button>
                  </div>

                  <div class="request-details">
                    <div class="tabs">
                      <div class="tabs-left">
                        <button class="tab active" data-section="params">
                          Params
                        </button>
                        <button class="tab" data-section="body">Body</button>
                        <button class="tab" data-section="auth">Auth</button>
                        <button class="tab" data-section="headers">
                          Headers
                        </button>
                        <button class="tab" data-section="curl">CURL</button>
                      </div>
                      <div class="tabs-right">
                        <button
                          id="switch-to-soap"
                          class="copy-curl-btn"
                          title="Switch to SOAP"
                        >
                          Switch to SOAP
                        </button>
                      </div>
                    </div>

                    <div
                      id="soap-controls"
                      class="soap-controls"
                      style="display: none"
                    >
                      <div class="soap-controls__row">
                        <label for="soap-version" class="soap-field">
                          <span class="soap-field__label">SOAP Version</span>
                          <select id="soap-version" class="soap-select">
                            <option value="1.1">1.1</option>
                            <option value="1.2">1.2</option>
                          </select>
                        </label>
                        <label
                          for="soap-action"
                          id="soap-action-field"
                          class="soap-field"
                        >
                          <span class="soap-field__label">SOAPAction</span>
                          <input
                            id="soap-action"
                            type="text"
                            class="soap-input"
                            placeholder="urn:action-or-endpoint"
                          />
                        </label>
                        <div class="soap-controls__actions">
                          <button
                            id="soap-format-xml"
                            class="soap-action-btn"
                            title="Format XML body"
                          >
                            Format XML
                          </button>
                        </div>
                      </div>
                      <div
                        id="soap-validation-message"
                        class="soap-validation-message"
                        role="status"
                        aria-live="polite"
                      ></div>
                    </div>

                    <div id="params-section" class="section active">
                      <div class="key-value-editor" id="params-editor">
                        <div class="kv-row">
                          <input type="checkbox" class="kv-checkbox" checked />
                          <input
                            type="text"
                            placeholder="Key"
                            class="key-input"
                          />
                          <input
                            type="text"
                            placeholder="Value"
                            class="value-input"
                          />
                          <button class="remove-btn">×</button>
                        </div>
                      </div>
                      <button class="add-param-btn">Add Parameter</button>
                    </div>

                    <div id="body-section" class="section">
                      <div id="request-body-editor-host"></div>
                    </div>

                    <div id="auth-section" class="section">
                      <select id="auth-type">
                        <option value="none">No Auth</option>
                        <option value="basic">Basic Auth</option>
                        <option value="bearer">Bearer Token</option>
                        <option value="api-key">API Key</option>
                        <option value="oauth2">OAuth 2.0</option>
                      </select>
                      <div id="auth-config" class="auth-config"></div>
                      <div
                        id="oauth-status"
                        class="oauth-status"
                        style="display: none"
                      >
                        <span class="status-icon" aria-hidden="true"></span>
                        <span class="status-text"></span>
                      </div>
                    </div>

                    <div id="headers-section" class="section">
                      <div class="key-value-editor" id="headers-editor">
                        <div class="kv-row">
                          <input type="checkbox" class="kv-checkbox" checked />
                          <input
                            type="text"
                            placeholder="Key"
                            class="key-input"
                          />
                          <input
                            type="text"
                            placeholder="Value"
                            class="value-input"
                          />
                          <button class="remove-btn">×</button>
                        </div>
                      </div>
                      <button class="add-header-btn">Add Header</button>
                    </div>

                    <div id="curl-section" class="section">
                      <div class="curl-section-toolbar">
                        <button
                          id="copy-curl-command"
                          class="curl-copy-btn"
                          title="Copy cURL command"
                        >
                          Copy
                        </button>
                        <button
                          id="open-in-curl-tool"
                          class="open-in-curl-btn"
                          title="Open in cURL Tool"
                        >
                          Open in cURL
                        </button>
                      </div>
                      <textarea
                        id="curl-command-output"
                        class="curl-output"
                        spellcheck="false"
                        readonly
                        aria-label="Generated cURL command"
                        placeholder="cURL command will appear here"
                      >
                      </textarea>
                    </div>
                  </div>
                </div>
                <div class="resize-handle" data-panel="request"></div>
              </div>

              <div class="response-panel">
                <div class="response-content">
                  <div class="response-toolbar">
                    <div class="response-toolbar__tabs">
                      <button
                        class="response-toolbar__tab active"
                        data-section="body"
                      >
                        Body
                      </button>
                      <button
                        class="response-toolbar__tab"
                        data-section="headers"
                      >
                        Headers
                      </button>
                    </div>
                    <div class="response-toolbar__meta" id="response-meta">
                      <span class="meta-chip meta-chip--status" id="meta-status"
                        >---</span
                      >
                      <span class="meta-chip meta-chip--time" id="meta-time"
                        >---</span
                      >
                      <span class="meta-chip meta-chip--size" id="meta-size"
                        >---</span
                      >
                    </div>
                    <span
                      class="response-toolbar__timestamp"
                      id="response-timestamp"
                    ></span>
                  </div>
                  <div id="response-body" class="response-section active">
                    <div class="response-placeholder">
                      Send a request to see the response here
                    </div>
                  </div>
                  <div id="response-headers" class="response-section">
                    <div class="response-placeholder">No response headers</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div id="json-viewer-tab" class="tab-content">
            <!-- JSON Viewer content will be rendered here by JsonViewerTab -->
          </div>

          <div id="json-compare-tab" class="tab-content">
            <!-- JSON Compare React component will be mounted here -->
          </div>

          <div id="load-testing-tab" class="tab-content">
            <!-- Load testing content will be rendered here by LoadTestPage -->
          </div>

          <div id="mock-server-tab" class="tab-content">
            <!-- Mock Server content will be rendered here by MockServerTabManager -->
          </div>

          <div id="notepad-tab" class="tab-content">
            <!-- Notepad workspace will be rendered here -->
          </div>

          <div id="ask-ai-tab" class="tab-content">
            <div class="coming-soon">
              <h2>Ask AI</h2>
              <p>Coming Soon...</p>
            </div>
          </div>

          <div id="curl-tool-tab" class="tab-content">
            <!-- cURL Tool content will be rendered here by CurlToolManager -->
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
