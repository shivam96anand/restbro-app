                format: "int32"
            RateLimit-Remaining:
              description: "The number of requests remaining in the current window."
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
            RateLimit-Limit:
              description: "The maximum number of requests the consumer may make in\
                \ the current window."
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Error"
