  description: "Operations for Product Resource"
paths:
  /product/{id}:
    get:
      tags:
      - "product"
      summary: "Retrieve a Product by ID"
      description: "Retrieve the full representation of a single Product identified\
        \ by its id. The caller must be authorised for the related party that owns\
        \ the product."
      operationId: "retrieveProduct"
      parameters:
      - name: "X-Business-Context"
        in: "header"
        description: "UUID correlator that uniquely identifies the calling business\
          \ context."
        required: false
        schema:
          maxLength: 36
          pattern: "^[0-9a-fA-F-]{36}$"
          type: "string"
          format: "uuid"
      - name: "id"
        in: "path"
        description: "Identifier of the Product to retrieve."
        required: true
        schema:
          maxLength: 256
          pattern: "^[A-Za-z0-9_.\\-]+$"
          type: "string"
      - name: "fields"
        in: "query"
        description: "Comma-separated list of attribute names to include in the response."
