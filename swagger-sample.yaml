openapi: "3.0.1"
info:
  title: "Enterprise Product Inventory"
  description: "**TMF API Reference : TMF 637 - Product Inventory Management** September\
    \ 2023 The Product Inventory Management API provides standardized mechanism for\
    \ product inventory management such as creation, update and retrieval of the representation\
    \ of a product in the inventory. It also allows the notification of events related\
    \ to product lifecycle. Copyright © TM Forum 2021. All Rights Reserved"
  contact:
    name: "B2B MNC"
    url: "https://yam-united.telekom.com/pages/atk-business-logic/apps/wiki/wiki/list/view/3fac14b4-49dd-4672-8e3e-c250106beff8?currentLanguage=NONE"
    email: "DOM-API_Pulsar@mg.telekom.de"
  version: "1.1.0"
  x-api-category: "G-API"
  x-mira-capability:
  - "MIRA 2 / Product and Market Sales"
  x-standard-reference:
    x-segment:
    - "B2B"
    x-mira-capability:
    - "Product Inventory Management"
    id: "TMF637"
    version: "5.0.0"
  x-vendor: false
  x-segment:
  - "B2B"
externalDocs:
  description: "TM Forum API guidelines and Telekom API standards reference for the\
    \ Enterprise Product Inventory Management API (TMF637 v5.0.0)."
  url: "https://docs.devops.telekom.de/docs/standards-and-security/api-guidelines/"
servers:
- url: "https://gateway.telekom.de/mabu/epim/EnterpriseProductInventory/v1"
security:
- oAuth2ClientCredentials:
  - "data_admin"
  - "data_read"
  - "data_create"
  - "data_cancel"
  - "data_update"
  - "data_terminate"
tags:
