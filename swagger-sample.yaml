  /product:
    get:
      tags:
      - "product"
      summary: "List or find Product objects"
      description: "List or find Product objects matching the supplied filter criteria.\
        \ Pagination is controlled with the offset and limit query parameters; the\
        \ response carries the X-Total-Count and X-Result-Count headers, and the same\
        \ counters are duplicated in the body envelope for consumers that cannot read\
        \ response headers."
      operationId: "listProduct"
      parameters:
      - name: "relatedPartyId"
        in: "query"
        description: "Filter products by the id of one of their related parties."
        required: true
        schema:
          maxLength: 256
          pattern: "^[A-Za-z0-9_.\\-]+$"
          type: "string"
      - name: "X-Business-Context"
        in: "header"
        description: "UUID correlator that uniquely identifies the calling business\
          \ context. Echoed back in the response."
        required: false
        schema:
          maxLength: 36
          pattern: "^[0-9a-fA-F-]{36}$"
          type: "string"
          format: "uuid"
      - name: "fields"
        in: "query"
        description: "Comma-separated list of attribute names to include in the response."
        required: false
        schema:
          maxLength: 4096
          pattern: "^[A-Za-z0-9_,.\\-]*$"
          type: "string"
      - name: "offset"
        in: "query"
        description: "The index of the first item to return (0-based)."
        required: false
        schema:
          maximum: 2147483647
          minimum: 0
          type: "integer"
          format: "int32"
      - name: "limit"
        in: "query"
        description: "The maximum number of items to return in this page."
        required: false
        schema:
          maximum: 1000
          minimum: 0
          type: "integer"
          format: "int32"
      - name: "sort"
        in: "query"
        description: "Comma-separated list of attribute names to sort by. Prefix with\
          \ '-' for descending."
        required: false
        schema:
          maxLength: 256
          pattern: "^-?[A-Za-z0-9_.]+(?:,-?[A-Za-z0-9_.]+)*$|^$"
          type: "string"
          default: ""
      responses:
        "503":
          description: "Service Unavailable"
          headers:
            X-Business-Context:
              description: "Echoes the X-Business-Context request header (a UUID correlator)."
              schema:
                maxLength: 36
                pattern: "^[0-9a-fA-F-]{36}$"
                type: "string"
                format: "uuid"
            RateLimit-Reset:
              description: "The number of seconds until the rate-limit window resets."
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
            RateLimit-Remaining:
              description: "The number of requests remaining in the current window."
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
            RateLimit-Limit:
              description: "The maximum number of requests the consumer may make in\
                \ the current window."
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Error"
        "200":
          description: "OK. A page of products is returned."
          headers:
            RateLimit-Remaining:
              description: "The number of requests remaining in the current window."
              style: "simple"
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
            X-Business-Context:
              description: "Echoes the X-Business-Context request header (a UUID correlator)."
              style: "simple"
              schema:
                maxLength: 36
                pattern: "^[0-9a-fA-F-]{36}$"
                type: "string"
                format: "uuid"
            RateLimit-Reset:
              description: "The number of seconds until the rate-limit window resets."
              style: "simple"
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
            X-Total-Count:
              description: "Total number of products matched by the query, ignoring\
                \ offset and limit."
              style: "simple"
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
            RateLimit-Limit:
              description: "The maximum number of requests the consumer may make in\
                \ the current window."
              style: "simple"
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
            X-Result-Count:
              description: "Number of products actually returned in this page (size\
                \ of data)."
              style: "simple"
              schema:
                maximum: 2147483647
                minimum: 0
                type: "integer"
                format: "int32"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCollection"
        "429":
          description: "Too Many Requests"
          headers:
