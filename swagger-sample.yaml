          creditProfile:
            maxItems: 1000
            type: "array"
            items:
              $ref: "#/components/schemas/CreditProfile"
          status:
            maxLength: 256
            pattern: "^[\\s\\S]*$"
            type: "string"
            description: "Used to track the lifecycle status of the party role."
          statusReason:
            maxLength: 256
            pattern: "^[\\s\\S]*$"
            type: "string"
            description: "A string providing an explanation on the value of the status\
              \ lifecycle. For instance if the status is Rejected, statusReason will\
              \ provide the reason for rejection."
          validFor:
            $ref: "#/components/schemas/TimePeriod"
        additionalProperties: false
    TargetProductSchema:
      type: "object"
      properties:
        '@type':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Class type of the target product"
        '@schemaLocation':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "This field provides a link to the schema describing the target\
            \ product"
          format: "uri-reference"
      additionalProperties: false
      description: "The reference object to the schema and type of target product\
        \ which is described by product specification"
    TaxDefinition:
      required:
      - "@type"
      type: "object"
      properties:
        '@type':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "When sub-classing, this defines the sub-class Extensible name"
        '@baseType':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "When sub-classing, this defines the super-class"
        '@schemaLocation':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "A URI to a JSON-Schema file that defines additional attributes\
            \ and relationships"
        id:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Unique identifier of the tax."
        name:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Tax name."
        validFor:
          $ref: "#/components/schemas/TimePeriod"
        jurisdictionName:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Name of the jurisdiction that levies the tax"
          example: "USA"
        jurisdictionLevel:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Level of the jurisdiction that levies the tax"
          example: "Country"
        taxType:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Type of the tax."
          example: "VAT"
      additionalProperties: false
      description: "A list of taxes that are covered by the exemption, e.g. City Tax,\
        \ State Tax. The definition would include the exemption (e.g. for a rate exemption\
        \ 0% would be a full exemption, 5% could be a partial exemption if the actual\
        \ rate was 10%)."
    TaxExemptionCertificate:
      required:
      - "@type"
      type: "object"
      properties:
        '@type':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "When sub-classing, this defines the sub-class Extensible name"
        '@baseType':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "When sub-classing, this defines the super-class"
        '@schemaLocation':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "A URI to a JSON-Schema file that defines additional attributes\
            \ and relationships"
        id:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Identifier of the tax exemption within list of the exemptions"
        taxDefinition:
          maxItems: 1000
          type: "array"
          items:
            $ref: "#/components/schemas/TaxDefinition"
        validFor:
          $ref: "#/components/schemas/TimePeriod"
        certificateNumber:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Identifier of a document that shows proof of exemption from\
            \ taxes for the taxing jurisdiction"
        issuingJurisdiction:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Name of the jurisdiction that issued the exemption"
          example: "USA"
        reason:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Reason for the tax exemption"
        attachment:
          oneOf:
          - $ref: "#/components/schemas/Attachment"
          - $ref: "#/components/schemas/AttachmentRef"
      additionalProperties: false
      description: "List of tax exemptions granted to the party. For example, a war\
        \ veteran might have partial exemption from state tax and a full exemption\
        \ from federal tax"
    TimePeriod:
      type: "object"
      properties:
        startDateTime:
          type: "string"
          description: "Start of the time period, using IETC-RFC-3339 format"
          format: "date-time"
          example: "1985-04-12T23:20:50.52Z"
        endDateTime:
          type: "string"
          description: "End of the time period, using IETC-RFC-3339 format"
          format: "date-time"
          example: "1985-04-12T23:20:50.52Z"
      additionalProperties: false
      description: "A period of time, either as a deadline (endDateTime only) a startDateTime\
        \ only, or both"
    Paging:
      required:
      - "last_page"
      - "page"
      - "total"
      type: "object"
      properties:
        total:
          maximum: 99999
          minimum: 0
          type: "integer"
          description: "Total number of items matching the search parameters, ignoring\
            \ offset and limit."
          format: "int32"
        page:
          maximum: 99999
          minimum: 1
          type: "integer"
          description: "Number of the current page (1-based), based on the requested\
            \ limit."
          format: "int32"
        last_page:
          maximum: 99999
          minimum: 1
          type: "integer"
          description: "Number of the last page, based on the requested limit."
          format: "int32"
      additionalProperties: false
      description: "Pagination summary for the current response."
    ProductCollection:
      type: "object"
      properties:
        products:
          maxItems: 1000
          minItems: 0
          type: "array"
          description: "Items returned in this page (after applying offset, limit\
            \ and sort)."
          items:
            $ref: "#/components/schemas/ENProduct"
        paging:
          $ref: "#/components/schemas/Paging"
        message:
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Optional human-readable message describing the result of the\
            \ request."
        _links:
          $ref: "#/components/schemas/_links"
      additionalProperties: false
      description: "A page of products returned by GET /product. Includes the matching\
        \ items, pagination counters and HATEOAS links."
    _links:
      required:
      - "first"
      - "last"
      - "self"
      type: "object"
      properties:
        self:
          maxLength: 500
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "URI for the current page."
          format: "uri-reference"
        first:
          maxLength: 500
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "URI for the first page."
          format: "uri-reference"
        prev:
          maxLength: 500
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "URI for the previous page (omitted on the first page)."
          format: "uri-reference"
        next:
          maxLength: 500
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "URI for the next page (omitted on the last page)."
          format: "uri-reference"
        last:
          maxLength: 500
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "URI for the last page."
          format: "uri-reference"
      additionalProperties: false
      description: "HATEOAS links for pagination of the current collection."
  securitySchemes:
    oAuth2ClientCredentials:
      type: "oauth2"
      description: "This API uses OAuth 2 with the clientCredentials grant flow."
      flows:
        clientCredentials:
          tokenUrl: "https://prod.spacegate.telekom.de/auth/realms/default/protocol/openid-connect/token"
          scopes:
            data_admin: "full access to all resources and operations"
            data_read: "read access to protected resources"
            data_create: "grant access to create protected resources"
            data_update: "grant access to update protected resources"
            data_cancel: "grant access to cancel protected resources"
            data_terminate: "grant access to terminate protected resources"
