components:
  schemas:
    Error:
      title: "Error"
      required:
      - "code"
      - "reason"
      type: "object"
      properties:
        '@type':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "When sub-classing, this defines the sub-class Extensible name"
        '@baseType':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "When sub-classing, this defines the super-class"
        '@schemaLocation':
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "A URI to a JSON-Schema file that defines additional attributes\
            \ and relationships"
          format: "uri"
        code:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Application relevant detail, defined in the API or a common\
            \ list."
        reason:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "Explanation of the reason for the error which can be shown\
            \ to a client user."
        message:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "More details and corrective actions related to the error which\
            \ can be shown to a client user."
        status:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
          description: "HTTP Error code extension"
        referenceError:
          maxLength: 256
          pattern: "^[\\s\\S]*$"
          type: "string"
