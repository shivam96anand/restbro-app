# .github/workflows/ci.yml
#
# Runs on every push and pull-request to validate that the project builds
# and that the test suite passes.  No signing or publishing happens here.

name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['v*']   # Release tags are handled by release.yml
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
