# .github/workflows/release.yml
#
# Builds, signs, notarizes, and publishes Restbro for macOS on every
# version tag push (e.g. v1.2.3).
#
# Required repository secrets (Settings → Secrets → Actions):
#
#   GH_TOKEN            — GitHub personal-access token or GITHUB_TOKEN with
#                         "contents: write" permission (for uploading releases).
#
#   CSC_LINK            — Base-64-encoded Developer ID Application .p12 certificate.
#                         Generate: base64 -i certificate.p12 | pbcopy
#   CSC_KEY_PASSWORD    — Password for the .p12 certificate.
#
#   APPLE_TEAM_ID       — 10-character Apple Developer Team ID (e.g. "AB12CD34EF").
#
#   APPLE_API_KEY_ID    — App Store Connect API key ID (e.g. "ABC123DEFG").
#   APPLE_API_ISSUER    — App Store Connect issuer UUID.
#   APPLE_API_KEY       — Full contents of the .p8 private key file (PEM text).
#
# --------------------------------------------------------------------------
# Local unsigned builds (no secrets needed):
#   npm run dist:unsigned

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # matches v1.0.0, v2.3.1, etc.

permissions:
  contents: write   # required to create/upload GitHub Releases

jobs:
  release-macos:
    name: Build & Release (macOS)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build TypeScript + Webpack ──────────────────────────────────
      - name: Build application
        run: npm run build

      # ── 5. Import Developer ID certificate into the macOS keychain ─────
      #
      # electron-builder reads CSC_LINK + CSC_KEY_PASSWORD automatically when
      # they are set as environment variables.  The keychain import step below
      # is an explicit alternative that works well on GitHub's macOS runners.
      #
      - name: Import code-signing certificate
        if: ${{ env.CSC_LINK != '' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Decode the base-64 certificate to a temp file
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"

          # Create a dedicated keychain to avoid polluting the login keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          # Make the keychain accessible without a password prompt
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to the keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      # ── 6. Package, sign, notarize, and publish ────────────────────────
      #
      # GH_TOKEN is used by electron-builder's GitHub publisher to create/
      # update the GitHub Release and upload artifacts.
      #
      - name: Package, sign, notarize & publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          # Code signing: the certificate was already imported into the macOS
          # keychain in the step above, so electron-builder finds it there
          # automatically.  Do NOT pass CSC_LINK here — when the secret is
          # absent it evaluates to an empty string, which electron-builder
          # misinterprets as a file path (the working directory) and fails
          # with "not a file".
          # CSC_IDENTITY_AUTO_DISCOVERY=false disables signing entirely when
          # the CSC_LINK secret has not been configured.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          # Notarization (scripts/notarize.js reads these)
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: npm run release

      # ── 7. Upload release artifacts as workflow artifacts (optional) ───
      #
      # In addition to the GitHub Release, keep the DMG/ZIP files attached
      # to the workflow run for 30 days so you can inspect them without
      # downloading from the release page.
      #
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          retention-days: 30
